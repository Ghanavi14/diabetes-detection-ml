{% extends "base.html" %}
{% block content %}
<div class="container mt-5 text-center">
	<h2 class="text-success">Training Successful</h2>
	{% if accuracy %}
		<p><strong>Model Accuracy:</strong> {{ accuracy}}%</p>
		<div class="my-4">
			<img src="{{url_for('static', filename='images/confusion_matrix.png') }}"
     			alt="Confusion Matrix"
     			class="img-fluid"
    			style="height: 300px; width:auto; display:block; margin:auto;">
    		</div>
		{% endif %}
	<p class="mt-3">Your model is now ready for prediction</p>
	<form action ="{{ url_for('predict') }}" style="display: inline;">
		<button type = "submit">Predict</button>
	</form>
</div>
{% endblock %}
